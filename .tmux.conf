set -a terminal-features "tmux-256color:RGB"
set-option -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=colour004 bg=default bold"
set -g status-right ""
set-option -g focus-events on
set -g status-left-length 200
set -g status-left "#[fg=colour001,bg=default]#S "

bind f run-shell "tmux neww /home/bsach/Code/setup/scripts/tmux-sessions.sh"
