# Hypridle configuration for automatic suspend
# Documentation: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    # Uncomment after configuring hyprlock (~/.config/hypr/hyprlock.conf):
    # lock_cmd = pidof hyprlock || hyprlock
    # before_sleep_cmd = loginctl lock-session
    # after_sleep_cmd = hyprctl dispatch dpms on
}

# Suspend after 30 minutes (1800 seconds) of idle time
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}

# Optional: turn off displays after 5.5 minutes of idle
# listener {
#     timeout = 330
#     on-timeout = hyprctl dispatch dpms off
#     on-resume = hyprctl dispatch dpms on
# }

# Optional: lock screen after 5 minutes of idle
# (requires ~/.config/hypr/hyprlock.conf to be set up)
# listener {
#     timeout = 300
#     on-timeout = hyprlock
# }
